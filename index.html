<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Face Gesture to Wemos - D1 R32 Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        .ui { background: #2d2d2d; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; width: 100%; max-width: 800px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 30px; font-weight: bold; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 20px; font-weight: bold; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
        .calibrating { background: #ff9800; color: white; }
        .ready { background: #4caf50; color: white; }
        .gesture-info { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        .badge { padding: 5px 10px; border-radius: 5px; background: #444; font-size: 14px; border: 1px solid #666; }
        .active { background: #55efc4; color: #000; border-color: #55efc4; }
        canvas { transform: scaleX(-1); border: 4px solid #444; border-radius: 12px; width: 100%; max-width: 800px; height: auto; }
    </style>
</head>
<body>

    <div class="ui">
        <button id="connectBtn">Wemos D1 R32 に接続</button>
        <div id="status">ステータス: 未接続</div>
        <div id="status_badge" class="status-badge calibrating">待機中</div>
        <div class="gesture-info" id="gesture_display">
            <div class="badge" id="b_open">口開(IO14)</div>
            <div class="badge" id="b_narrow">口絞(IO27)</div>
            <div class="badge" id="b_l_up">左上(IO16)</div>
            <div class="badge" id="b_r_up">右上(IO17)</div>
            <div class="badge" id="b_eb_up">眉上(IO25)</div>
        </div>
    </div>

    <canvas id="output_canvas"></canvas>
    <video id="input_video" style="display:none;"></video>

<script>
const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let char = null;
let lastSentFlags = [false, false, false, false, false];
let syncTimer = null;

let isCalibrated = false;
let calibrationFrames = 0;
const CALIBRATION_STEPS = 20; 
let baseline = { mouthOpen: 0, mouthWidth: 0, eyebrowDist: 0, leftCornerRaise: 0, rightCornerRaise: 0 };

const btn = document.getElementById('connectBtn');
const status = document.getElementById('status');
const badge = document.getElementById('status_badge');
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

function getDistance(p1, p2) {
    return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
}

btn.onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'WEMOS-D1-R32-AI' }],
            optionalServices: [S_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(S_UUID);
        char = await service.getCharacteristic(C_UUID);
        status.innerText = "接続成功！ 3秒間真顔で待機...";
        btn.disabled = true;
        start();
    } catch (e) { status.innerText = "接続失敗"; }
};

async function sendData(flags) {
    if (!char) return;
    try {
        // ラベルマッピング: T=口開, I=口絞, M=左上, R=右上, P=眉上
        const labels = ['T', 'I', 'M', 'R', 'P'];
        const msg = labels.map((l, i) => `${l}:${flags[i] ? 1 : 0}`).join(',') + '\n';
        await char.writeValue(new TextEncoder().encode(msg));
        lastSentFlags = [...flags];
    } catch (e) { console.error("BLE送信エラー"); }
}

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

faceMesh.onResults((res) => {
    canvasElement.width = res.image.width;
    canvasElement.height = res.image.height;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);

    let currentFlags = [false, false, false, false, false];

    if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
        const landmarks = res.multiFaceLandmarks[0];
        const faceScale = getDistance(landmarks[1], landmarks[152]);
        
        const curMouthOpen = getDistance(landmarks[13], landmarks[14]) / faceScale;
        const curMouthWidth = getDistance(landmarks[61], landmarks[291]) / faceScale;
        const curEyebrow = getDistance(landmarks[52], landmarks[159]) / faceScale;
        const mouthCenterY = (landmarks[13].y + landmarks[14].y) / 2;
        const curLeftCornerRaise = (mouthCenterY - landmarks[291].y) / faceScale;
        const curRightCornerRaise = (mouthCenterY - landmarks[61].y) / faceScale;

        if (!isCalibrated) {
            baseline.mouthOpen += curMouthOpen;
            baseline.mouthWidth += curMouthWidth;
            baseline.eyebrowDist += curEyebrow;
            baseline.leftCornerRaise += curLeftCornerRaise;
            baseline.rightCornerRaise += curRightCornerRaise;
            calibrationFrames++;
            status.innerText = `解析中... ${Math.round(calibrationFrames/CALIBRATION_STEPS*100)}%`;
            if (calibrationFrames >= CALIBRATION_STEPS) {
                Object.keys(baseline).forEach(k => baseline[k] /= CALIBRATION_STEPS);
                isCalibrated = true;
                status.innerText = "キャリブレーション完了";
                badge.innerText = "READY";
                badge.className = "status-badge ready";
            }
        } else {
            const isMouthOpen = curMouthOpen > (baseline.mouthOpen * 5 + 0.02);
            const isMouthNarrow = curMouthWidth < baseline.mouthWidth * 0.8;
            const isLeftUp = curLeftCornerRaise > baseline.leftCornerRaise + 0.02;
            const isRightUp = curRightCornerRaise > baseline.rightCornerRaise + 0.02;
            const isSymmetrical = Math.abs(curLeftCornerRaise - curRightCornerRaise) < 0.03;
            const isEyebrowUp = curEyebrow > baseline.eyebrowDist * 1.3;

            // フラグ配列の構築 [口開, 口絞, 左上, 右上, 眉上]
            currentFlags[0] = isMouthOpen;
            currentFlags[1] = isMouthNarrow;
            currentFlags[2] = (isLeftUp && !isRightUp && !isMouthOpen && !isSymmetrical);
            currentFlags[3] = (isRightUp && !isLeftUp && !isMouthOpen && !isSymmetrical);
            currentFlags[4] = isEyebrowUp;

            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#FFFFFF20', lineWidth: 1});
        }
    }

    // 同期送信ロジック (200ms)
    const hasChanged = currentFlags.some((val, idx) => val !== lastSentFlags[idx]);
    if (hasChanged && !syncTimer && isCalibrated) {
        syncTimer = setTimeout(() => {
            sendData(currentFlags);
            syncTimer = null;
        }, 200);
    }

    updateUI(currentFlags);
    canvasCtx.restore();
});

function updateUI(flags) {
    const ids = ['b_open', 'b_narrow', 'b_l_up', 'b_r_up', 'b_eb_up'];
    ids.forEach((id, i) => {
        document.getElementById(id).className = `badge ${flags[i] ? 'active' : ''}`;
    });
}

function start() {
    const cam = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 1280, height: 720
    });
    cam.start();
}
</script>
</body>
</html>
